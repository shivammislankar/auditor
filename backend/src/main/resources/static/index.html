<!DOCTYPE html>
<html>
<head>
    <title>A11y Auditor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container py-5">
<h1 class="mb-4">Website Accessibility Auditor</h1>

<div class="input-group mb-3">
    <input type="text" id="urlInput" class="form-control" placeholder="Enter website URL (https://...)">
    <button class="btn btn-primary" onclick="runScan()">Analyze Site</button>
</div>

<div id="loading" class="d-none text-info mb-3">Scanning... please wait (this takes a few seconds)</div>

<h3>Recent Scans</h3>
<table class="table table-striped">
    <thead>
    <tr>
        <th>URL</th>
        <th>Issues Found</th>
        <th>Date</th>
    </tr>
    </thead>
    <tbody id="historyBody"></tbody>
</table>

<script>
    async function runScan() {
        const url = document.getElementById('urlInput').value;
        document.getElementById('loading').classList.remove('d-none');

        await fetch(`/api/v1/audit?url=${encodeURIComponent(url)}`);

        document.getElementById('loading').classList.add('d-none');
        loadHistory();
    }

    async function loadHistory() {
        const response = await fetch('/api/v1/audit/history');
        const data = await response.json();
        const body = document.getElementById('historyBody');
        body.innerHTML = data.map(item => `
            <tr>
                <td>${item.url}</td>
                <td><span class="badge bg-danger">${item.totalViolations}</span></td>
                <td>${new Date(item.scanDate).toLocaleString()}</td>
            </tr>
        `).join('');
    }

    // Load history on page open
    loadHistory();
</script>
</body>
</html>
