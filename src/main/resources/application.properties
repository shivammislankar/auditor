# 1. THE DATABASE URL
# It will use DB_URL from Render, or default to H2 locally.
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb}

# 2. THE USER & PASS
# These are pulled from Render's Env Vars. Default 'sa' for local H2.
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}

# 3. HIBERNATE SETTINGS
# 'update' is perfect for now; it creates your tables automatically.
spring.jpa.hibernate.ddl-auto=update

# 4. H2 CONSOLE (Only works when running locally)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 5. SECRETS (From your Env Vars)
spring.mail.password=${MAIL_PASSWORD}
jwt.secret=${JWT_SECRET}